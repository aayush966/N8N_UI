<!DOCTYPE html>
<html>
<head>
    <title>Tracking Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="H1.css">
</head>
<body>

<div class="container">
    <h2>UNIUNI Tracking Dashboard</h2>

    <div class="filters">
        <label>Start Date:</label>
        <input type="date" id="startDate">

        <label>End Date:</label>
        <input type="date" id="endDate">

        <button id="runBtn">Run Tracking</button>
        <button id="stopBtn" >Stop</button>
    </div>

    <div id="status"></div>

    <table id="resultTable" style>
        <thead>
            <tr>
                <th>order_id</th>
                <th>shipping_carrier</th>
                <th>tracking_number</th>
                <th>status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="H1.js"></script>
</body>
</html>
